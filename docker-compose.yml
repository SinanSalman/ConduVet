services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: conduvet
      POSTGRES_USER: conduvet
      POSTGRES_PASSWORD: conduvet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduvet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://conduvet:conduvet@db:5432/conduvet
      SECRET_KEY: change-this-in-production
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000"
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      USER_DOMAIN: ${USER_DOMAIN:-example.com}
      PIN_EXPIRATION_MINUTES: ${PIN_EXPIRATION_MINUTES:-15}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./users.csv:/app/users.csv:ro
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backups:
